name: Build & Deploy

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libgl1-mesa-dev libsdl2-dev libsdl2-ttf-dev

    - name: Build CPU Engine
      run: |
        cmake -S . -B build-cpu -DBUILD_CPU=ON
        cmake --build build-cpu

    - name: Build GPU Engine
      run: |
        cmake -S . -B build-gpu -DBUILD_GPU=ON
        cmake --build build-gpu

    - name: Run Math Tests
      run: |
        cd tests && make && ./test_math

  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Build Web Engine
      run: |
        emcmake cmake -S . -B build-web -DBUILD_WEB=ON
        cmake --build build-web

    - name: Prepare deployment
      run: |
        mkdir -p deploy
        cp web/index.html deploy/
        cp build-web/index.js deploy/
        cp build-web/index.wasm deploy/
        cp web/coi-serviceworker.js deploy/
        # Copy assets if needed
        if [ -d "assets" ]; then cp -r assets deploy/; fi

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: deploy
        branch: gh-pages
