name: Memory Safety Check

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libgl1-mesa-dev libsdl2-dev libsdl2-ttf-dev
        
    - name: Build Engine with AddressSanitizer
      run: |
        # Build CPU engine only with ASan and UBSan flags enabled
        export CFLAGS="-fsanitize=address,undefined -g -fno-omit-frame-pointer"
        export LDFLAGS="-fsanitize=address,undefined"
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_CPU=ON -DBUILD_GPU=OFF
        cmake --build build --parallel
        
    - name: Run Memory Leak Tests (ASan)
      working-directory: ./build
      run: |
        # ASan handles memory leak detection natively at exit
        # If any leak or undefined behavior occurs, the test will automatically fail
        ctest --output-on-failure
