name: Check Formatting

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Check clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
        # find all C/C++ source and header files, excluding third_party
        find . -type f \( -name '*.c' -o -name '*.h' -o -name '*.cc' -o -name '*.cpp' \) | grep -v 'third_party' | xargs clang-format -i
        
        # Check if clang-format made any changes
        if ! git diff --exit-code; then
          echo "::error::Code is not formatted correctly. Please run clang-format locally."
          exit 1
        fi
