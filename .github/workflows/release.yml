name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        engine: [CPU, GPU]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libgl1-mesa-dev libsdl2-dev libsdl2-ttf-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install sdl2 sdl2_ttf pkg-config

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-SDL2
          mingw-w64-ucrt-x86_64-SDL2_ttf

    - name: Build Engine (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -S . -B build_${{ matrix.engine }} -DCMAKE_BUILD_TYPE=Release -DBUILD_${{ matrix.engine }}=ON
        cmake --build build_${{ matrix.engine }} --parallel

    - name: Build Engine (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        cmake -S . -B build_${{ matrix.engine }} -DCMAKE_BUILD_TYPE=Release -DBUILD_${{ matrix.engine }}=ON
        cmake --build build_${{ matrix.engine }} --parallel

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p package
        if [ "${{ runner.os }}" == "Windows" ]; then
          cp build_${{ matrix.engine }}/mandelbrot_*.exe package/
          cd package
          zip -r ../mandelbrot-${{ matrix.os }}-${{ matrix.engine }}.zip .
        else
          cp build_${{ matrix.engine }}/mandelbrot_* package/
          cd package
          tar -czf ../mandelbrot-${{ matrix.os }}-${{ matrix.engine }}.tar.gz .
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.os }}-${{ matrix.engine }}
        path: mandelbrot-${{ matrix.os }}-${{ matrix.engine }}.*
        retention-days: 1

  build-wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Build Web Engine
      run: |
        emcmake cmake -S . -B build_web -DCMAKE_BUILD_TYPE=Release -DBUILD_WEB=ON
        cmake --build build_web --parallel

    - name: Prepare deployment
      run: |
        mkdir -p deploy
        cp web/index.html deploy/
        cp web/style.css deploy/
        cp web/app.js deploy/
        cp web/coi-serviceworker.js deploy/
        cp build_web/index.js deploy/
        cp build_web/index.wasm deploy/
        cp build_web/index.worker.js deploy/ 2>/dev/null || true
        if [ -d "assets" ]; then cp -r assets deploy/; fi

    - name: Package WASM
      run: |
        zip -r mandelbrot-wasm.zip deploy/

    - name: Upload WASM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-wasm
        path: mandelbrot-wasm.zip
        retention-days: 1

  publish-release:
    needs: [build-release, build-wasm]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
        generate_release_notes: true
