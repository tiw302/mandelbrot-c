<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Mandelbrot Explorer</title>
    <style>
        /* minimalist css reset */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        @font-face {
            font-family: 'AppFont';
            src: url('assets/font.ttf') format('truetype');
        }

        body {
            background: #000;
            color: #ccc;
            font-family: 'AppFont', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            outline: none;
        }

        #toolbar {
            position: fixed;
            top: env(safe-area-inset-top, 0); 
            left: 0; right: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }

        #toolbar button {
            background: rgba(34, 34, 34, 0.8);
            color: #eee;
            border: 1px solid #444;
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2px;
        }

        #toolbar button:active { background: #555; }

        @media (max-width: 600px) {
            #toolbar button { padding: 12px 16px; font-size: 13px; }
        }

        #debug-info {
            position: fixed;
            top: 50px; /* adjusted so it's below the toolbar */
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 4px;
            line-height: 1.5;
            white-space: pre;
            pointer-events: none;
            z-index: 10;
        }

        #zoom-box {
            position: fixed;
            border: 2px solid yellow;
            background: rgba(255, 255, 0, 0.2);
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        #info {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 4px 10px;
            background: rgba(0,0,0,0.6);
            font-size: 11px;
            color: #eee;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #info a { color: #fff; text-decoration: none; opacity: 0.8; }
        #info a:hover { opacity: 1; text-decoration: underline; }

        @media (max-width: 600px) {
            #info { font-size: 9px; padding: 6px 8px; }
            #info span:first-child { display: none; } /* hide long text on mobile */
            #info::before { content: "Scroll/Pinch=Zoom | Drag=Move"; }
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-family: -apple-system, sans-serif;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">initializing engine...</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="toolbar">
        <button onclick="Module._wasm_reset_view()">reset</button>
        <button onclick="Module._wasm_undo_zoom()">undo</button>
        <button onclick="toggleTour()" id="tourBtn">tour</button>
        <button onclick="Module._wasm_next_palette()" id="paletteBtn">palette</button>
        <button onclick="toggleGpu()" id="gpuBtn">gpu ✓</button>
        <button onclick="Module._wasm_toggle_julia()" id="juliaBtn">julia</button>
        <button onclick="Module._wasm_adjust_iterations(100)">iter+</button>
        <button onclick="Module._wasm_adjust_iterations(-100)">iter-</button>
        <button onclick="downloadScreenshot()">screenshot</button>
    </div>

    <div id="debug-info"></div>
    <div id="zoom-box"></div>

    <div id="info">
        <span>Scroll=Zoom | L-Drag=Select | R-Drag=Pan | R=Reset | P=Pal | J=Julia | T=Tour | G=GPU | S=Shot | Ctrl+Z=Undo | Arrows=Iter</span>
        <a href="https://github.com/tiw302/mandelbrot-c" target="_blank">github.com/tiw302/mandelbrot-c</a>
    </div>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const debugInfo = document.getElementById('debug-info');
        const zoomBox = document.getElementById('zoom-box');

        const PALETTES = ["sine wave", "grayscale", "fire", "electric", "ocean", "inferno"];
        let _gpuMode = true;
        let _tourActive = false;
        let _juliaMode = false;

        function toggleTour() {
            Module._wasm_toggle_tour();
            _tourActive = !_tourActive;
            document.getElementById('tourBtn').textContent = _tourActive ? 'stop tour' : 'tour';
        }

        function toggleGpu() {
            Module._wasm_toggle_gpu();
            _gpuMode = !_gpuMode;
            document.getElementById('gpuBtn').textContent = _gpuMode ? 'gpu ✓' : 'cpu';
        }

        // Global functions called by WASM via EM_JS
        window.updateDebugInfo = function(gpu_mode, julia_mode, max_iters, zoom, center_re, center_im, palette_idx, tour_phase, julia_re, julia_im) {
            let engine = julia_mode ? "julia" : "mandelbrot";
            if (gpu_mode) engine += " (gpu)";
            else engine += " (cpu)";

            let tour_str = tour_phase !== 0 ? " | tour: on" : "";

            let html = `${engine}${tour_str}\n`;

            if (julia_mode) {
                html += `c: (${julia_re.toFixed(10)}, ${julia_im.toFixed(10)})\n`;
            } else {
                html += `center: (${center_re.toFixed(10)}, ${center_im.toFixed(10)})\n`;
            }

            html += `zoom: ${zoom.toPrecision(4)} | iter: ${max_iters} | palette: ${PALETTES[palette_idx % 5]}`;

            debugInfo.textContent = html;
        };

        window.updateZoomBox = function(is_zooming, x, y, w, h) {
            if (is_zooming) {
                zoomBox.style.display = 'block';
                zoomBox.style.left = x + 'px';
                zoomBox.style.top = y + 'px';
                zoomBox.style.width = w + 'px';
                zoomBox.style.height = h + 'px';
            } else {
                zoomBox.style.display = 'none';
            }
        };

        function syncSize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (Module._wasm_set_resolution) {
                Module._wasm_set_resolution(w, h);
            }
        }

        function downloadScreenshot() {
            const link = document.createElement('a');
            link.download = `mandelbrot_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // emscripten module configuration
        var Module = {
            preRun: [],
            postRun: [function() {
                syncSize();
                window.addEventListener('resize', () => {
                    clearTimeout(window._rt);
                    window._rt = setTimeout(syncSize, 100);
                });

                // keyboard shortcuts
                window.addEventListener('keydown', (e) => {
                    if (e.repeat) return;
                    const key = e.key.toLowerCase();
                    if (key === 'r') Module._wasm_reset_view();
                    if (key === 'p') Module._wasm_next_palette();
                    if (key === 't') toggleTour();
                    if (key === 'j') Module._wasm_toggle_julia();
                    if (key === 'g') toggleGpu();
                    if (key === 's') downloadScreenshot();
                    if (e.key === 'ArrowUp') Module._wasm_adjust_iterations(10);
                    if (e.key === 'ArrowDown') Module._wasm_adjust_iterations(-10);
                    if (key === 'z' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        Module._wasm_undo_zoom();
                    }
                });

                // touch support for mobile: pinch-to-zoom + single-finger pan
                let lastTouches = [];
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    lastTouches = Array.from(e.touches);
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touches = Array.from(e.touches);
                    if (touches.length === 1 && lastTouches.length === 1) {
                        // single finger pan
                        const dx = touches[0].clientX - lastTouches[0].clientX;
                        const dy = touches[0].clientY - lastTouches[0].clientY;
                        // simulate right-drag pan via wasm_zoom_at trick - just re-center
                        const w = window.innerWidth, h = window.innerHeight;
                        Module._wasm_zoom_at(w/2 - dx, h/2 - dy, 1.0);
                    } else if (touches.length === 2 && lastTouches.length === 2) {
                        // pinch zoom
                        const d0 = Math.hypot(
                            lastTouches[0].clientX - lastTouches[1].clientX,
                            lastTouches[0].clientY - lastTouches[1].clientY);
                        const d1 = Math.hypot(
                            touches[0].clientX - touches[1].clientX,
                            touches[0].clientY - touches[1].clientY);
                        if (d0 > 0) {
                            const factor = d0 / d1;
                            const cx = (touches[0].clientX + touches[1].clientX) / 2;
                            const cy = (touches[0].clientY + touches[1].clientY) / 2;
                            Module._wasm_zoom_at(cx, cy, factor);
                        }
                    }
                    lastTouches = touches;
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    lastTouches = Array.from(e.touches);
                }, { passive: false });
            }],
            print: (text) => console.log(text),
            canvas: canvas,
            setStatus: (text) => {
                if (!text) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 600);
                } else {
                    statusText.textContent = text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: (left) => {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? `loading dependencies (${this.totalDependencies - left}/${this.totalDependencies})...` : '');
            }
        };

        window.onerror = (event) => {
            statusText.textContent = "error: could not load engine.";
            statusText.style.color = "#ff5555";
        };

        // check for webgl2 support using a temporary canvas so we don't steal the context from sokol
        const tempCanvas = document.createElement('canvas');
        const gl = tempCanvas.getContext('webgl2');
        if (!gl) {
            statusText.textContent = "error: webgl 2.0 not supported.";
            statusText.style.color = "#ff5555";
        }
    </script>
    <script async src="index.js"></script>
</body>
</html>
