<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mandelbrot Explorer</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #ccc;
            font-family: monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }

        #toolbar button {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
        }

        #toolbar button:active { background: #555; }

        #info {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 4px 8px;
            background: rgba(0,0,0,0.5);
            font-size: 10px;
            color: #fff;
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }

        #info a { color: #fff; text-decoration: none; }
        #info a:hover { color: #ccc; }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: opacity 0.5s;
        }

        @media (max-width: 600px) {
            #toolbar button { padding: 10px 14px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div>Loading...</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="toolbar">
        <button onclick="Module._wasm_reset_view()">Reset</button>
        <button onclick="Module._wasm_undo_zoom()">Undo</button>
        <button onclick="Module._wasm_toggle_tour()" id="tourBtn" title="Auto Tour (T)">Tour</button>
        <button onclick="Module._wasm_next_palette()">Palette</button>
        <button onclick="Module._wasm_toggle_julia()">Julia</button>
        <button onclick="Module._wasm_adjust_iterations(100)">Iter+</button>
        <button onclick="Module._wasm_adjust_iterations(-100)">Iter-</button>
    </div>

    <div id="info">
        <span>Scroll=Zoom | Left-drag=Select | Right-drag=Pan | R=Reset P=Palette J=Julia</span>
        <a href="https://github.com/tiw302/mandelbrot-c" target="_blank">github.com/tiw302/mandelbrot-c</a>
    </div>

    <script>
        var loadingScreen = document.getElementById('loading-screen');
        var canvas = document.getElementById('canvas');

        // Interaction State
        var state = {
            pendingZoom: null, // { cx, cy, factor }
            pendingPan: null,  // { dx, dy }
            ticking: false
        };

        function syncSize() {
            var w = window.innerWidth;
            var h = window.innerHeight;
            if (Module._wasm_set_resolution) {
                Module._wasm_set_resolution(w, h);
            }
        }

        function requestUpdate() {
            if (!state.ticking) {
                requestAnimationFrame(update);
                state.ticking = true;
            }
        }

        function update() {
            state.ticking = false;

            if (state.pendingZoom) {
                Module._wasm_zoom_at(state.pendingZoom.cx, state.pendingZoom.cy, state.pendingZoom.factor);
                state.pendingZoom = null;
            }
            
            if (state.pendingPan) {
                Module._wasm_pan(state.pendingPan.dx, state.pendingPan.dy);
                state.pendingPan = null;
            }
        }

        var Module = {
            preRun: [],
            postRun: [function() {
                syncSize();
                window.addEventListener('resize', function() {
                    clearTimeout(window._rt);
                    window._rt = setTimeout(syncSize, 150);
                });

                var initialDistance = 0;

                canvas.addEventListener('touchstart', function(e) {
                    if (e.touches.length >= 2) {
                        if (Module._wasm_cancel_zoom) Module._wasm_cancel_zoom();
                        var dx = e.touches[0].clientX - e.touches[1].clientX;
                        var dy = e.touches[0].clientY - e.touches[1].clientY;
                        initialDistance = Math.sqrt(dx*dx + dy*dy);
                    }
                }, {passive: false});

                canvas.addEventListener('touchmove', function(e) {
                    if (e.touches.length >= 2) {
                        e.preventDefault();
                        if (Module._wasm_cancel_zoom) Module._wasm_cancel_zoom();
                        var dx = e.touches[0].clientX - e.touches[1].clientX;
                        var dy = e.touches[0].clientY - e.touches[1].clientY;
                        var distance = Math.sqrt(dx*dx + dy*dy);
                        if (initialDistance > 0) {
                            var factor = initialDistance / distance;
                            if (Math.abs(1.0 - factor) > 0.02) {
                                state.pendingZoom = {
                                    cx: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                                    cy: (e.touches[0].clientY + e.touches[1].clientY) / 2,
                                    factor: factor
                                };
                                initialDistance = distance;
                                requestUpdate();
                            }
                        }
                    }
                }, {passive: false});

                window.addEventListener('keydown', function(e) {
                    if (e.key === 'r') Module._wasm_reset_view();
                    if (e.key === 'p') Module._wasm_next_palette();
                    if (e.key === 't') Module._wasm_toggle_tour();
                    if (e.key === 'j') Module._wasm_toggle_julia();
                    if (e.key === 'z' && e.ctrlKey) {
                        e.preventDefault();
                        Module._wasm_undo_zoom();
                    }
                });
            }],
            print: function(text) { console.log(text); },
            canvas: canvas,
            setStatus: function(text) {
                if (!text) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(function() { loadingScreen.style.display = 'none'; }, 500);
                }
            },
            monitorRunDependencies: function() {}
        };

        window.onerror = function() {
            document.querySelector('#loading-screen div').textContent = "Error loading engine.";
        };
    </script>
    <script async src="mandelbrot.js"></script>
</body>
</html>
