<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Explorer | WebAssembly Edition</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --panel-bg: rgba(22, 27, 34, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        canvas {
            display: block;
            width: 800px;
            height: 600px;
            background: black;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid #30363d;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .controls-hint {
            margin-top: 10px;
            color: #8b949e;
            font-size: 12px;
        }

        #status {
            position: absolute;
            bottom: 20px;
            font-family: monospace;
            color: var(--accent-color);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Compiling Fractal Engine...</p>
    </div>

    <div id="canvas-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <div id="status">Ready</div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var loadingScreen = document.getElementById('loading-screen');

        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                };
            })(),
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })(),
            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                statusElement.innerHTML = text;
                if (!text) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 500);
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All dependencies loaded.');
            }
        };

        Module.setStatus('Downloading...');
        window.onerror = function(event) {
            Module.setStatus('Exception thrown, see JavaScript console');
            Module.printErr('Exception thrown: ' + event);
        };
    </script>
    <script async src="mandelbrot.js"></script>
</body>
</html>
